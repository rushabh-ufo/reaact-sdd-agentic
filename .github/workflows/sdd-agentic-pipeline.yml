name: SDD Agentic Pipeline

on:
  push:
    branches-ignore:
      - main
      - master
    paths:
      - 'specs/**'

permissions:
  contents: write
  pull-requests: write

jobs:

  detect-spec:
    runs-on: ubuntu-latest

    outputs:
      spec_file: ${{ steps.detect.outputs.spec_file }}
      spec_type: ${{ steps.detect.outputs.spec_type }}
      service_name: ${{ steps.detect.outputs.service_name }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Spec
        id: detect
        run: |

          BEFORE="${{ github.event.before }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git rev-parse --verify "$BEFORE" >/dev/null 2>&1; then
            # New branch — diff against main/master to find the spec file introduced on this branch
            git fetch origin main 2>/dev/null || git fetch origin master 2>/dev/null
            BASE=$(git rev-parse origin/main 2>/dev/null || git rev-parse origin/master 2>/dev/null)
            SPEC_FILE=$(git diff --name-only "$BASE" "${{ github.sha }}" | grep '^specs/' | head -1)
          else
            SPEC_FILE=$(git diff --name-only "$BEFORE" "${{ github.sha }}" | grep '^specs/' | head -1)
          fi

          if [ -z "$SPEC_FILE" ]; then
            echo "No spec file found in changed files. Exiting."
            exit 1
          fi

          echo "SPEC_FILE=$SPEC_FILE"

          SPEC_TYPE=$(echo $SPEC_FILE | cut -d'/' -f2)

          SERVICE_NAME=$(basename $SPEC_FILE .md)

          echo "spec_file=$SPEC_FILE" >> $GITHUB_OUTPUT
          echo "spec_type=$SPEC_TYPE" >> $GITHUB_OUTPUT
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT

  generate-code:

    needs: detect-spec

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: npm install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Read Spec File
        run: cat "${{ needs.detect-spec.outputs.spec_file }}"

      - name: Generate Code using Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |

          SPEC_TYPE="${{ needs.detect-spec.outputs.spec_type }}"
          SPEC_FILE="${{ needs.detect-spec.outputs.spec_file }}"

          claude --dangerously-skip-permissions -p \
            "You are generating code for an existing Next.js 16 project using the Pages Router.

          Read the project config and specification below, then generate all required files
          directly into this repository following the outputStructure paths defined in the config.
          Do not create a new project — add files to the existing project structure.

          ## Project Config (.claudecode/${SPEC_TYPE}.json)
          $(cat .claudecode/${SPEC_TYPE}.json)

          ## Specification (${SPEC_FILE})
          $(cat ${SPEC_FILE})"

      - name: Run Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test -- --ci --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Commit Generated Code
        run: |

          git config --global user.email "rushabh_ufo@yahoo.com"
          git config --global user.name "rushabh_ufo"

          git add -A

          git diff --cached --quiet || git commit -m "Generated code from spec: ${{ needs.detect-spec.outputs.service_name }}"

          git push

  security-scans:

    needs: generate-code

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull Latest Commits
        run: git pull

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          scan-type: fs
          scan-ref: .
          output: reports/trivy.txt

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v2
        with:
          output: reports/semgrep.json

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "SDD Generated App"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/

  create-pr:

    needs:
      - generate-code
      - security-scans

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          gh pr create \
            --title "[SDD Generated] ${{ needs.detect-spec.outputs.service_name }}" \
            --draft \
            --base main \
            --body "## SDD Agentic Generated Pull Request

          This PR contains AI-generated code from the specification file.

          ### Specification
          - File: \`${{ needs.detect-spec.outputs.spec_file }}\`
          - Type: \`${{ needs.detect-spec.outputs.spec_type }}\`

          ---

          ## Review Checklist

          - [ ] Code structure validated
          - [ ] Security concerns reviewed
          - [ ] Business logic verified
          - [ ] Unit tests passing
          - [ ] API contracts validated
          - [ ] OWASP scan reviewed
          - [ ] Coverage acceptable

          ---

          ## Generated Artifacts

          - Application code
          - Unit tests
          - Lint configuration
          - Coverage reports

          ---
          This PR was automatically generated by the SDD Agentic Pipeline." \
            || echo "PR already exists for this branch"
